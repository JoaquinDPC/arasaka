services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arasaka
      POSTGRES_USER: arasaka-user
      POSTGRES_PASSWORD: arasaka-pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arasaka-user -d arasaka"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config.yml:/app/config.yml:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
